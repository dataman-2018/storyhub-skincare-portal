<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f7f6f3; --s: #fff; --t: #1a1a2e; --ts: #6b7280;
  --a: #1a5c6b; --a2: #2d8f9e; --al: #e8f4f6; --b: #e5e2db;
  --green: #16a34a; --red: #dc2626; --orange: #c4845e; --gold: #d4a853;
}

body {
  font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--t);
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

/* ── Nav ── */
.portal-nav{position:fixed;top:0;left:0;right:0;z-index:9999;height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(26,26,46,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06)}
.portal-brand{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#fff;letter-spacing:.03em;opacity:.7}
.portal-brand a{color:#fff;text-decoration:none}
.portal-links{display:flex;gap:20px}
.portal-links a{font-size:11px;color:#fff;text-decoration:none;opacity:.5;transition:opacity .2s;padding-bottom:2px}
.portal-links a:hover{opacity:1}
.portal-links a.active{opacity:1;color:#2d8f9e;border-bottom:2px solid #2d8f9e}

/* ── Layout ── */
.container { max-width: 1200px; margin: 0 auto; padding: 48px 24px 60px; }

/* ── Page Header ── */
.page-header { margin-bottom: 32px; }
.page-header h1 {
  font-family: 'DM Sans', sans-serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--t);
  margin-bottom: 4px;
}
.page-header .subtitle {
  font-size: 14px;
  color: var(--ts);
  margin-bottom: 12px;
}
.badge-proto {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .05em;
  padding: 4px 10px;
  border-radius: 4px;
  background: #fef3c7;
  color: #92400e;
  border: 1px solid #fde68a;
}

/* ── Tabs ── */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--b);
  margin-bottom: 24px;
}
.tab-btn {
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ts);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.tab-btn:hover { color: var(--t); }
.tab-btn.active { color: var(--a); border-bottom-color: var(--a); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Sort / Filter buttons ── */
.btn-group { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.btn-sm {
  padding: 5px 14px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 6px;
  border: 1px solid var(--b);
  background: var(--s);
  color: var(--ts);
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.btn-sm:hover { border-color: var(--a); color: var(--a); }
.btn-sm.active { background: var(--a); color: #fff; border-color: var(--a); }

/* ── Chart wrappers ── */
.chart-wrap { background: var(--s); border-radius: 12px; padding: 20px; border: 1px solid var(--b); }
.chart-wrap canvas { width: 100% !important; }

/* ── Detail Panel (shared) ── */
.detail-panel {
  background: var(--s);
  border: 1px solid var(--b);
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
  animation: fadeIn .2s ease;
}
.detail-panel h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.detail-col h4 { font-size: 12px; font-weight: 600; color: var(--ts); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
.detail-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid #f3f2ef; }
.detail-row .label { color: var(--ts); }
.detail-row .value { font-weight: 500; }
.detail-insight {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--al);
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.7;
  color: var(--a);
}
.detail-insight strong { font-weight: 600; }
.fit-stars { color: var(--gold); letter-spacing: 2px; }

/* ── Table ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--ts);
  text-transform: uppercase;
  letter-spacing: .04em;
  border-bottom: 2px solid var(--b);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.data-table th:hover { color: var(--a); }
.data-table th .sort-arrow { font-size: 10px; margin-left: 3px; opacity: .4; }
.data-table th.sorted .sort-arrow { opacity: 1; color: var(--a); }
.data-table td { padding: 10px 12px; border-bottom: 1px solid #f3f2ef; vertical-align: middle; }
.data-table tbody tr { cursor: pointer; transition: background .15s; }
.data-table tbody tr:hover { background: #fafaf8; }
.data-table tbody tr.expanded { background: var(--al); }

.gap-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.gap-badge.miss { background: #fef2f2; color: var(--red); }
.gap-badge.strong { background: #f0fdf4; color: var(--green); }
.gap-badge.sync { background: #f9fafb; color: var(--ts); }

.cat-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

.table-detail-row td { padding: 0; border-bottom: 1px solid var(--b); }
.table-detail-row .detail-panel { margin: 0; border: none; border-radius: 0; }

.note-dummy { font-size: 10px; color: var(--ts); font-style: italic; margin-top: 4px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* ── Responsive ── */
@media (max-width: 900px) {
  .container { padding: 48px 12px 40px; }
  .detail-grid { grid-template-columns: 1fr; }
  .portal-links { gap: 12px; }
  .portal-links a { font-size: 10px; }
  .data-table { font-size: 12px; }
  .data-table th, .data-table td { padding: 8px 6px; }
}
</style>

/* Derived: gap = extRank - noteRank (positive = note stronger, negative = external stronger) */
themes.forEach(t => { t.gap = t.extRank - t.noteRank; });

const CAT_COLORS = { ingredient:'#c4845e', concern:'#1a5c6b', routine:'#d4a853', brand:'#2d8f9e' };
const CAT_LABELS = { ingredient:'成分系', concern:'悩み系', routine:'ルーティン系', brand:'ブランド系' };

/* ================================================================
   TABS
   ================================================================ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

/* ================================================================
   HELPERS
   ================================================================ */
function stars(n) { return '<span class="fit-stars">' + '★'.repeat(n) + '☆'.repeat(5-n) + '</span>'; }

function gapLabel(g) {
  if (g < -3) return { text: '⚠ 取りこぼし ' + g, cls: 'miss' };
  if (g > 3) return { text: '★ 強み +' + g, cls: 'strong' };
  return { text: '─ 連動 ' + (g >= 0 ? '+' : '') + g, cls: 'sync' };
}

function gapType(g) {
  if (g < -3) return 'miss';
  if (g > 3) return 'strong';
  return 'sync';
}

function buildDetailHTML(t) {
  const gl = gapLabel(t.gap);
  return `
  <div class="detail-panel">
    <h3>${t.name} <span class="gap-badge ${gl.cls}" style="font-size:12px;margin-left:8px;">${gl.text}</span></h3>
    <div class="detail-grid">
      <div class="detail-col">
        <h4>外部データ（Google Trends）</h4>
        <div class="detail-row"><span class="label">順位</span><span class="value">${t.extRank}位</span></div>
        <div class="detail-row"><span class="label">YoY成長率</span><span class="value">+${t.extGrowth}%</span></div>
        <div class="detail-row"><span class="label">ピーク月</span><span class="value">${t.extPeak}</span></div>
        <div class="detail-row"><span class="label">背景</span><span class="value" style="text-align:right;max-width:220px;">${t.extContext}</span></div>
      </div>
      <div class="detail-col">
        <h4>noteデータ（ダミー）</h4>
        <div class="detail-row"><span class="label">順位</span><span class="value">${t.noteRank}位</span></div>
        <div class="detail-row"><span class="label">記事数</span><span class="value">${t.noteArticles}</span></div>
        <div class="detail-row"><span class="label">月間PV</span><span class="value">${t.notePV}</span></div>
        <div class="detail-row"><span class="label">読了率</span><span class="value">${t.noteRead}</span></div>
        <div class="detail-row"><span class="label">相性スコア</span><span class="value">${stars(t.fit)}</span></div>
      </div>
    </div>
    <div class="detail-insight"><strong>示唆:</strong> ${t.fitText}</div>
  </div>`;
}

/* ================================================================
   VIEW 1: GAP BAR CHART
   ================================================================ */
let gapChart;
let gapSorted = [...themes];
let currentBarSort = 'gap';

function sortGapData(mode) {
  if (mode === 'gap') {
    gapSorted = [...themes].sort((a,b) => a.gap - b.gap);
  } else {
    gapSorted = [...themes].sort((a,b) => b.extGrowth - a.extGrowth);
  }
}

function renderGapChart() {
  sortGapData(currentBarSort);
  const labels = gapSorted.map(t => t.name);
  const data = gapSorted.map(t => t.gap);
  const colors = data.map(v => v < 0 ? 'rgba(220,38,38,0.7)' : 'rgba(26,92,107,0.7)');
  const borderColors = data.map(v => v < 0 ? '#dc2626' : '#1a5c6b');

  if (gapChart) gapChart.destroy();

  const canvas = document.getElementById('gapChart');
  canvas.style.height = (themes.length * 36) + 'px';

  gapChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 3,
        barThickness: 22
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      onClick(e, els) {
        if (els.length) {
          const t = gapSorted[els[0].index];
          document.getElementById('barDetailPanel').innerHTML = buildDetailHTML(t);
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: ctx => ctx[0].label,
            label: ctx => {
              const t = gapSorted[ctx.dataIndex];
              const v = ctx.raw;
              return v < 0
                ? `取りこぼし: 外部${t.extRank}位 vs note${t.noteRank}位 (差${v})`
                : `noteの強み: 外部${t.extRank}位 vs note${t.noteRank}位 (+${v})`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#f3f2ef' },
          title: { display: true, text: '← 外部より弱い（取りこぼし）　|　外部より強い（noteの強み）→', font: { size: 11 }, color: '#6b7280' },
          ticks: { font: { size: 11 } }
        },
        y: {
          grid: { display: false },
          ticks: { font: { size: 12, family: "'Noto Sans JP'" } }
        }
      }
    }
  });
}

/* Sort buttons */
document.querySelectorAll('[data-sort]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentBarSort = btn.dataset.sort;
    renderGapChart();
  });
});

renderGapChart();

/* ================================================================
   VIEW 2: DIRECTION MATRIX (Bubble Scatter)
   ================================================================ */
function renderMatrix() {
  const datasets = {};
  themes.forEach(t => {
    const cat = t.category;
    if (!datasets[cat]) {
      datasets[cat] = {
        label: CAT_LABELS[cat] || cat,
        data: [],
        backgroundColor: CAT_COLORS[cat] + 'aa',
        borderColor: CAT_COLORS[cat],
        borderWidth: 1
      };
    }
    datasets[cat].data.push({
      x: t.noteGrowth,
      y: t.extGrowth,
      r: Math.max(t.noteArticles / 20, 4),
      _theme: t
    });
  });

  const diagonalPlugin = {
    id: 'diagonalLine',
    afterDraw(chart) {
      const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
      const maxVal = Math.max(x.max, y.max);
      const x0 = x.getPixelForValue(0), y0 = y.getPixelForValue(0);
      const x1 = x.getPixelForValue(maxVal), y1 = y.getPixelForValue(maxVal);
      ctx.save();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = '#9ca3af';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
      ctx.restore();
    }
  };

  const quadrantPlugin = {
    id: 'quadrantLabels',
    afterDraw(chart) {
      const { ctx, chartArea: { left, right, top, bottom } } = chart;
      ctx.save();
      ctx.font = '11px "Noto Sans JP"';
      ctx.fillStyle = 'rgba(107,114,128,0.35)';
      ctx.textAlign = 'center';
      const cx = (left + right) / 2, cy = (top + bottom) / 2;
      ctx.fillText('取りこぼし', left + (cx - left) * 0.3, top + 24);
      ctx.fillText('両方成長', cx + (right - cx) * 0.7, top + 24);
      ctx.fillText('静観', left + (cx - left) * 0.3, bottom - 12);
      ctx.fillText('noteの強み', cx + (right - cx) * 0.7, bottom - 12);
      ctx.restore();
    }
  };

  new Chart(document.getElementById('matrixChart'), {
    type: 'bubble',
    data: { datasets: Object.values(datasets) },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            label(ctx) {
              const t = ctx.raw._theme;
              return `${t.name}: note YoY ${t.noteGrowth}%, 外部 YoY ${t.extGrowth}%, 記事数 ${t.noteArticles}`;
            }
          }
        },
        legend: { position: 'bottom', labels: { font: { size: 11, family: "'Noto Sans JP'" }, usePointStyle: true, pointStyle: 'circle' } }
      },
      scales: {
        x: {
          title: { display: true, text: 'note PV YoY 成長率 (%)', font: { size: 12 }, color: '#6b7280' },
          grid: { color: '#f3f2ef' },
          ticks: { font: { size: 11 }, callback: v => v + '%' },
          min: -5
        },
        y: {
          title: { display: true, text: 'Google Trends YoY 成長率 (%)', font: { size: 12 }, color: '#6b7280' },
          grid: { color: '#f3f2ef' },
          ticks: { font: { size: 11 }, callback: v => v + '%' },
          min: 0
        }
      }
    },
    plugins: [diagonalPlugin, quadrantPlugin]
  });
}
renderMatrix();

/* ================================================================
   VIEW 3: DETAIL TABLE
   ================================================================ */
let tableSortCol = 'gap';
let tableSortAsc = true;
let tableFilter = 'all';

function renderTable() {
  let data = [...themes];

  /* Filter */
  if (tableFilter === 'miss') data = data.filter(t => t.gap < -3);
  else if (tableFilter === 'strong') data = data.filter(t => t.gap > 3);
  else if (tableFilter === 'sync') data = data.filter(t => t.gap >= -3 && t.gap <= 3);

  /* Sort */
  data.sort((a, b) => {
    let va = a[tableSortCol], vb = b[tableSortCol];
    if (tableSortCol === 'name') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return tableSortAsc ? -1 : 1;
    if (va > vb) return tableSortAsc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  data.forEach(t => {
    const gl = gapLabel(t.gap);
    const tr = document.createElement('tr');
    tr.dataset.name = t.name;
    tr.innerHTML = `
      <td><span class="cat-dot" style="background:${CAT_COLORS[t.category]}"></span>${t.name}</td>
      <td>${t.extRank}</td>
      <td>+${t.extGrowth}%</td>
      <td>${t.noteRank}</td>
      <td><span class="gap-badge ${gl.cls}">${gl.text}</span></td>
      <td>${stars(t.fit)}</td>`;
    tr.addEventListener('click', () => toggleTableDetail(tr, t));
    tbody.appendChild(tr);
  });
}

function toggleTableDetail(tr, t) {
  const existing = tr.nextElementSibling;
  if (existing && existing.classList.contains('table-detail-row')) {
    existing.remove();
    tr.classList.remove('expanded');
    return;
  }
  /* Close any other open */
  document.querySelectorAll('.table-detail-row').forEach(r => { r.previousElementSibling.classList.remove('expanded'); r.remove(); });
  tr.classList.add('expanded');
  const detailTr = document.createElement('tr');
  detailTr.classList.add('table-detail-row');
  detailTr.innerHTML = '<td colspan="6">' + buildDetailHTML(t) + '</td>';
  tr.after(detailTr);
}

/* Table sort headers */
document.querySelectorAll('.data-table th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (tableSortCol === col) { tableSortAsc = !tableSortAsc; }
    else { tableSortCol = col; tableSortAsc = true; }
    document.querySelectorAll('.data-table th').forEach(h => {
      h.classList.remove('sorted');
      h.querySelector('.sort-arrow').textContent = '▲';
    });
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = tableSortAsc ? '▲' : '▼';
    renderTable();
  });
});

/* Filter buttons */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tableFilter = btn.dataset.filter;
    renderTable();
  });
});

renderTable();
</script>
